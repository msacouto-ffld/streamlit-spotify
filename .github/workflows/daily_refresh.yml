name: Daily Data Refresh

on:
  schedule:
    - cron: "0 7 * * *"   # 7am UTC daily (adjust to taste)
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Kworb (all markets)
        run: python fetch/scrape_kworb.py

      - name: Merge enriched cache with fresh data
        run: |
          python3 -c "
          import pandas as pd
          from pathlib import Path

          data_dir = Path('data')
          fresh    = pd.read_parquet(data_dir / 'all_markets.parquet')
          cache    = data_dir / '_enrich_cache.parquet'

          if cache.exists():
              lookup = pd.read_parquet(cache)[['artist', 'title', 'album_art_url', 'spotify_url']]
              enriched = fresh.merge(lookup, on=['artist', 'title'], how='left')
              enriched['album_art_url'] = enriched['album_art_url'].fillna('')
              enriched['spotify_url']   = enriched['spotify_url'].fillna('')
          else:
              enriched = fresh
              enriched['album_art_url'] = ''
              enriched['spotify_url']   = ''

          enriched.to_parquet(data_dir / 'enriched.parquet', index=False)
          print(f'Enriched {len(enriched):,} rows')
          art_pct = (enriched['album_art_url'] != '').mean() * 100
          print(f'Album art coverage: {art_pct:.1f}%')
          "

      - name: Upload to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python fetch/upload_supabase.py